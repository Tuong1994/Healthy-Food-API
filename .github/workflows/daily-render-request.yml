name: Daily Render Ping

on:
  schedule:
    - cron: '*/12 * * * *'   # every 12 minutes
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render service
        run: |
          echo "Pinging at $(date)"
          curl -s -o /dev/null -w "%{http_code}" -I https://healthy-food-api-g4t7.onrender.com || echo "Curl failed"
          echo "Ping completed"
